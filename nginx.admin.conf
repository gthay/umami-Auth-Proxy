worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/includes/common-http.conf;

    geo $real_client_ip $admin_allowed {
        default 0;
        include /etc/nginx/admin-allow.geo;
    }

    limit_req_zone $real_client_ip zone=auth_zone:10m rate=2r/s;
    limit_req_zone $real_client_ip zone=dashboard_zone:10m rate=20r/s;

    limit_req_status 429;
    client_max_body_size 8k;

    upstream umami {
        server UMAMI_UPSTREAM;
    }

    server {
        listen 8080;
        server_name _;

        include /etc/nginx/includes/common-server.conf;

        location = /health {
            auth_basic off;
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = /api/auth/login {
            if ($admin_allowed = 0) {
                return 403;
            }

            limit_req zone=auth_zone burst=5 nodelay;
            client_max_body_size 1k;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        location /api/ {
            if ($admin_allowed = 0) {
                return 403;
            }

            limit_req zone=dashboard_zone burst=40 nodelay;
            client_max_body_size 64k;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        location / {
            if ($admin_allowed = 0) {
                return 403;
            }

            limit_req zone=dashboard_zone burst=40 nodelay;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }
    }
}
