worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server_tokens off;

    log_format main '$http_x_forwarded_for - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    map $http_x_forwarded_for $xff_first_hop {
        default        "";
        "~^\s*(?P<first>[^,\s]+)" $first;
    }

    map $xff_first_hop $real_client_ip {
        default        $remote_addr;
        "~^(?:\d{1,3}(?:\.\d{1,3}){3}|\[?[0-9A-Fa-f:.]+\]?)$" $xff_first_hop;
    }

    map $http_x_forwarded_proto $forwarded_proto {
        default        $scheme;
        "~*^https$"    https;
        "~*^http$"     http;
    }

    geo $real_client_ip $admin_allowed {
        default 0;
        include /etc/nginx/admin-allow.geo;
    }

    limit_req_zone $real_client_ip zone=auth_zone:10m rate=2r/s;
    limit_req_zone $real_client_ip zone=dashboard_zone:10m rate=20r/s;

    limit_req_status 429;
    client_max_body_size 8k;

    upstream umami {
        server UMAMI_UPSTREAM;
    }

    server {
        listen 8080;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        location = /health {
            auth_basic off;
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location = /api/auth/login {
            if ($admin_allowed = 0) {
                return 403;
            }

            limit_req zone=auth_zone burst=5 nodelay;
            client_max_body_size 1k;

            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location /api/ {
            if ($admin_allowed = 0) {
                return 403;
            }

            limit_req zone=dashboard_zone burst=40 nodelay;
            client_max_body_size 64k;

            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location / {
            if ($admin_allowed = 0) {
                return 403;
            }

            limit_req zone=dashboard_zone burst=40 nodelay;

            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $real_client_ip;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }
    }
}
