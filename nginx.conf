worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ---------- basics ----------
    include /etc/nginx/includes/common-http.conf;

    # ---------- rate limiting (keyed on real client IP) ----------
    # Login/auth: 2 requests/second per IP, small burst
    limit_req_zone $real_client_ip zone=auth_zone:10m rate=2r/s;

    # General dashboard: 20 requests/second per IP
    limit_req_zone $real_client_ip zone=dashboard_zone:10m rate=20r/s;

    # Tracking ingestion: 30 requests/second per IP
    limit_req_zone $real_client_ip zone=tracking_zone:10m rate=30r/s;

    # Return 429 instead of default 503
    limit_req_status 429;

    # ---------- default body size ----------
    # Restrictive default — overridden per-location where needed
    client_max_body_size 8k;

    # ---------- upstream ----------
    upstream umami {
        server UMAMI_UPSTREAM;
    }

    server {
        listen 8080;
        server_name _;

        # ---------- security headers (all responses) ----------
        include /etc/nginx/includes/common-server.conf;

        # ============================================================
        # Health check — local only, no proxy
        # ============================================================
        location = /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ============================================================
        # PUBLIC: Tracking script
        # ============================================================
        location ~ ^/(script\.js|umami\.js|tracker\.js)$ {
            limit_req zone=tracking_zone burst=10 nodelay;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        # ============================================================
        # PUBLIC: Tracking data ingestion — rate limited, tiny body
        # ============================================================
        location = /api/send {
            limit_req zone=tracking_zone burst=20 nodelay;
            client_max_body_size 4k;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        # ============================================================
        # PUBLIC: Batch ingestion
        # Same trust level as /api/send, but with a modestly larger body.
        # ============================================================
        location = /api/batch {
            limit_req zone=tracking_zone burst=10 nodelay;
            client_max_body_size 16k;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        # ============================================================
        # PUBLIC: Pixel and tracked-link collectors
        # ============================================================
        location ^~ /p/ {
            limit_req zone=tracking_zone burst=20 nodelay;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        location ^~ /q/ {
            limit_req zone=tracking_zone burst=20 nodelay;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        include /etc/nginx/generated/collector-extra-locations.conf;

        # ============================================================
        # PUBLIC: Shared dashboard links
        # ============================================================
        location /share/ {
            limit_req zone=dashboard_zone burst=20 nodelay;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        # ============================================================
        # LOCKED: Login endpoint — Basic Auth + aggressive rate limit
        # An attacker must crack Basic Auth before touching Umami auth.
        # 2 req/s = max ~170k attempts/day from a single IP.
        # ============================================================
        location = /api/auth/login {
            limit_req zone=auth_zone burst=5 nodelay;
            client_max_body_size 1k;

            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        # ============================================================
        # Umami API (all except the public collector routes above)
        # JWT-protected by Umami
        # No Basic Auth here (browser fetch doesn't forward it).
        # Body size capped to prevent abuse of data import/export.
        # ============================================================
        location /api/ {
            limit_req zone=dashboard_zone burst=40 nodelay;
            client_max_body_size 64k;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        # ============================================================
        # Static assets (Next.js chunks, manifests, icons)
        # ============================================================
        location /_next/ {
            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        location = /favicon.ico {
            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        location = /site.webmanifest {
            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        # ============================================================
        # Everything else (dashboard pages) — Basic Auth required
        # ============================================================
        location / {
            limit_req zone=dashboard_zone burst=40 nodelay;

            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://umami;
            include /etc/nginx/includes/common-proxy-headers.conf;
        }

        # ============================================================
        # Catch-all deny — anything not matched above gets blocked
        # ============================================================
        # (nginx won't reach here because location / catches all,
        #  but this documents the intent)
    }
}
