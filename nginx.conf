worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ---------- basics ----------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ---------- rate limiting ----------
    # Zone for login/auth attempts: 5 requests/second per IP, burst 10
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;

    # Zone for general dashboard browsing: 20 requests/second per IP
    limit_req_zone $binary_remote_addr zone=dashboard_zone:10m rate=20r/s;

    # Return 429 (Too Many Requests) instead of default 503
    limit_req_status 429;

    # ---------- upstream ----------
    upstream umami {
        # Railway internal DNS — service name from your Railway project
        # Set via UMAMI_HOST env var, templated by entrypoint.sh
        server UMAMI_UPSTREAM;
    }

    server {
        listen 8080;
        server_name _;

        # --- Health check for Railway ---
        location = /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ============================================================
        # PUBLIC endpoints — no auth, no aggressive rate limit
        # These MUST remain open so your websites can send analytics.
        # ============================================================

        # Tracking script (Umami serves it at multiple paths)
        location ~ ^/(script\.js|umami\.js|tracker\.js)$ {
            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Tracking API endpoint (where the script POSTs events)
        location = /api/send {
            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Public share URLs (if you use Umami's share feature)
        location /share/ {
            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # Umami login endpoint — Basic Auth + tight rate limit
        # This is the critical gate: without correct Basic Auth creds,
        # no one can even attempt an Umami login (not even via curl).
        # ============================================================
        location = /api/auth/login {
            limit_req zone=auth_zone burst=10 nodelay;

            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # Umami API (everything except login) — no Basic Auth
        # These endpoints require a valid Umami session token (JWT).
        # JS fetch() from the dashboard doesn't reliably forward
        # Basic Auth credentials, so we let Umami handle API auth.
        # ============================================================
        location /api/ {
            limit_req zone=dashboard_zone burst=40 nodelay;

            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets (Next.js chunks, manifests, etc.)
        location /_next/ {
            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # Everything else (dashboard pages) — Basic Auth required
        # ============================================================
        location / {
            limit_req zone=dashboard_zone burst=40 nodelay;

            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://umami;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
